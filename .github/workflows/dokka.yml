name: Build & Deploy Dokka docs

on:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - name: Restore previous doc versions
        run: |
          mkdir -p previousDocVersions
          git fetch origin gh-pages --depth=1 || exit 0
          WORK=$(mktemp -d)
          git worktree add "$WORK" origin/gh-pages

          # preserve already-archived older versions
          if [ -d "$WORK/older" ]; then
            cp -r "$WORK/older"/* previousDocVersions/ 2>/dev/null || true
          fi

          # archive the currently deployed version (skip if same as current)
          if [ -f "$WORK/version.json" ]; then
            PREV_VERSION=$(jq -r '.version' "$WORK/version.json")
            CURRENT_VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
            if [ -n "$PREV_VERSION" ] && [ "$PREV_VERSION" != "$CURRENT_VERSION" ]; then
              mkdir -p "previousDocVersions/$PREV_VERSION"
              rsync -a --exclude='older/' "$WORK/" "previousDocVersions/$PREV_VERSION/"
            fi
          fi

          git worktree remove "$WORK"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Build with Gradle
        run: ./gradlew dokkaGeneratePublicationHtml --stacktrace

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/dokka/html
          force_orphan: false
          cname: slib.plasmoverse.com
