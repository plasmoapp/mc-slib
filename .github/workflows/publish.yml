name: Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Check if already published
        id: check
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          if curl -sf "https://repo.plasmoverse.com/releases/su/plo/slib/common/${VERSION}/common-${VERSION}.pom" > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published, skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.published != 'true'
        run: ./gradlew publishAllPublicationsToPlasmoverseReleasesRepository -Pmodded.versions_mode=ALL --stacktrace
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

      - name: Tag version
        if: steps.check.outputs.published != 'true'
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          git tag "${VERSION}"
          git push origin "${VERSION}"
